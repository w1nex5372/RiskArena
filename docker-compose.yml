services:
  postgres:
    image: postgres:16-alpine
    container_name: riskarena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-riskarena_db}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${PG_DB:-riskarena_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: riskarena-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB:-riskarena_db}
      PG_USER: postgres
      PG_PASSWORD: postgres
      ADMIN_KEY: ${ADMIN_KEY:?ADMIN_KEY is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ALLOW_INSECURE_DEV_AUTH: ${ALLOW_INSECURE_DEV_AUTH:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-YOUR_TELEGRAM_BOT_TOKEN_HERE}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      RISKARENA_WALLET_PRIVATE_KEY: ${RISKARENA_WALLET_PRIVATE_KEY:-}
      RISKARENA_WALLET_ADDRESS: ${RISKARENA_WALLET_ADDRESS:-YourWalletAddressHere12345678901234567890123456789}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      PORT: "8001"
    ports:
      - "8001:8001"

  gameserver:
    build:
      context: ./gameserver
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
    container_name: riskarena-gameserver
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: "2567"
      FASTAPI_URL: http://backend:8001
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      SKIP_AUTH: "false"
    ports:
      - "2567:2567"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-}
        REACT_APP_GAME_SERVER_URL: ${REACT_APP_GAME_SERVER_URL:-}
    container_name: riskarena-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
