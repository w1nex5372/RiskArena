<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="-1" />
    <meta name="version" content="10.0-RISKARENA-20260525" />
    <meta name="build-timestamp" content="20260525" />
    <meta name="app-version" content="10.0-RISKARENA-20260525" />
    <meta name="telegram-cache" content="none" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="RiskArena - real-time arena battles, progression, and token-powered rewards." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RiskArena" />
    <link rel="manifest" href="/manifest.json" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>RiskArena</title>
    <!-- These two scripts have been added for testing, please do not edit or remove them. -->
    <script src="https://unpkg.com/rrweb@latest/dist/rrweb.min.js"></script>
    <script src="https://d2adkz2s9zrlge.cloudfront.net/rrweb-recorder-20250919-1.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      const RISKARENA_VERSION = '10.0-RISKARENA-20260525';
      const IS_LOCAL_DEV = ['localhost', '127.0.0.1'].includes(window.location.hostname);

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        });
      }

      if ('caches' in window) {
        caches.keys().then((names) => names.forEach((name) => caches.delete(name)));
      }

      const stored = localStorage.getItem('app_version');
      if (stored !== RISKARENA_VERSION) {
        const keep = new Map();
        [
          'riskarena_user',
          'riskarena_last_eur_amount',
          'riskarena_last_sol_eur_price',
          'casino_user',
          'casino_user_session',
          'casino_last_eur_amount',
          'casino_last_sol_eur_price',
        ].forEach((key) => {
          const value = localStorage.getItem(key);
          if (value != null) keep.set(key, value);
        });

        localStorage.clear();
        sessionStorage.clear();
        keep.forEach((value, key) => localStorage.setItem(key, value));
        localStorage.setItem('app_version', RISKARENA_VERSION);
      }

      if (!IS_LOCAL_DEV) {
        console.log('RiskArena version:', RISKARENA_VERSION);
      }
    </script>
  </body>
</html>
